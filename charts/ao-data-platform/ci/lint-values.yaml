# Minimal values that let `helm template` fully render in CI.
#
# `helm lint` does not fully render subchart values, so a typo or wrong nesting
# in a deep path (e.g. the operator's `altinity-clickhouse-operator.configs.files`
# label allowlist) would pass lint while being silently ignored. The lint job
# renders the chart with these values to catch that, but the always-on ClickHouse
# users have required ExternalSecret fields with no defaults — supply placeholders
# here so the render reaches every template. These are CI placeholders only and
# are never deployed.
clickhouse:
  otel:
    externalSecret:
      secretStoreRef:
        name: ci-placeholder
      remoteRef:
        key: ci-placeholder
  schemaOwner:
    externalSecret:
      secretStoreRef:
        name: ci-placeholder
      remoteRef:
        key: ci-placeholder
  llmWorker:
    externalSecret:
      secretStoreRef:
        name: ci-placeholder
      remoteRef:
        key: ci-placeholder
  monteCarlo:
    externalSecret:
      secretStoreRef:
        name: ci-placeholder
      remoteRef:
        key: ci-placeholder

# Exercise the (default-off) Azure Gateway path so its four templates — gateway,
# gateway-httproutes, gateway-certificates, gateway-backend-tls — render in CI.
# tls.enabled defaults true, so the backendTLS re-encrypt path renders against a valid
# config. CI placeholders only; never deployed.
gateway:
  enabled: true
  otelHostname: otel.ci-placeholder.internal
  clickhouseHostname: clickhouse.ci-placeholder.internal
  tls:
    letsencrypt:
      azureDNS:
        hostedZoneName: ci-placeholder.internal
        resourceGroupName: ci-placeholder
        subscriptionID: ci-placeholder
        managedIdentityClientID: ci-placeholder
