{{- if .Values.gateway.enabled }}
# Routes each public listener to its ClusterIP backend. The collector serves OTLP/HTTP
# on 4318; ClickHouse serves its HTTPS interface on 8443.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ao-data-platform.fullname" . }}-otel
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "ao-data-platform.fullname" . }}
      sectionName: otel
  hostnames:
    - {{ .Values.gateway.otelHostname | quote }}
  rules:
    - backendRefs:
        - name: opentelemetry-collector
          port: 4318
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ao-data-platform.fullname" . }}-clickhouse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ include "ao-data-platform.fullname" . }}
      sectionName: clickhouse
  hostnames:
    - {{ .Values.gateway.clickhouseHostname | quote }}
  rules:
    - backendRefs:
        - name: clickhouse-otel
          port: 8443
{{- end }}
