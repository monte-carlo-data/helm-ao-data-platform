{{- if and .Values.tls.enabled .Values.tls.certManager.createCA }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ao-data-platform-selfsigned
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ao-data-platform-ca
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: ao-data-platform-ca
  secretName: ao-data-platform-ca
  duration: 87600h # 10 years
  renewBefore: 8760h # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: ao-data-platform-selfsigned
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: ao-data-platform-ca
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  ca:
    secretName: ao-data-platform-ca
{{- end }}
