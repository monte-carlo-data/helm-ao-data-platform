apiVersion: "clickhouse.altinity.com/v1"
kind: "ClickHouseInstallation"
metadata:
  name: {{ include "ao-data-platform.chiName" . }}
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  configuration:
    clusters:
      - name: "otel"
        layout:
          shardsCount: 1
          replicasCount: 1
    users:
      otel/password:
        valueFrom:
          secretKeyRef:
            name: {{ .Values.clickhouse.otelSecret }}
            key: password
      otel/networks/ip:
        {{- toYaml .Values.clickhouse.otelNetworksIp | nindent 8 }}
      {{- if .Values.clickhouse.otel.restrictGrants }}
      # otel (ingest) — restricted to INSERT on the telemetry source tables. The MV cascade runs
      # as schema_owner (the MV DEFINER), so otel needs nothing on the normalized targets. Gated
      # so it can stay broad until external readers have moved to monte_carlo, then be flipped on.
      otel/grants/query:
        - "GRANT INSERT ON otel_traces.otel_traces"
        - "GRANT INSERT ON otel_traces.otel_metrics"
      {{- end }}
      # schema_owner — DDL/owner identity for the schema Job and the persistent MV DEFINER.
      # Full DDL on otel_traces + ALTER on system.* (system-log TTLs) + SYSTEM FLUSH LOGS;
      # deliberately NO access management.
      schema_owner/password:
        valueFrom:
          secretKeyRef:
            name: {{ .Values.clickhouse.schemaOwner.secret }}
            key: password
      schema_owner/networks/ip:
        {{- toYaml .Values.clickhouse.schemaOwner.networksIp | nindent 8 }}
      schema_owner/grants/query:
        - "GRANT CREATE DATABASE ON *.*"
        - "GRANT CREATE TABLE, CREATE VIEW, ALTER, SELECT, INSERT, DROP, OPTIMIZE ON otel_traces.*"
        - "GRANT ALTER ON system.*"
        - "GRANT SYSTEM FLUSH LOGS ON *.*"
      # llm_worker — the llm-worker Deployment. Reads the queue, appends results (no mutations).
      llm_worker/password:
        valueFrom:
          secretKeyRef:
            name: {{ .Values.clickhouse.llmWorkerUser.secret }}
            key: password
      llm_worker/networks/ip:
        {{- toYaml .Values.clickhouse.llmWorkerUser.networksIp | nindent 8 }}
      llm_worker/grants/query:
        - "GRANT SELECT ON otel_traces.llm_batches"
        - "GRANT SELECT ON otel_traces.llm_inputs"
        - "GRANT SELECT ON otel_traces.llm_results"
        - "GRANT INSERT ON otel_traces.llm_batches"
        - "GRANT INSERT ON otel_traces.llm_results"
      # monte_carlo — Monte Carlo read-only service account + agent queue producer. Shared reader
      # bundle plus the queue/eval-score INSERTs. NO readonly profile: readonly=2 would block these
      # INSERTs, so the read-mostly shape is enforced by grants alone.
      monte_carlo/password:
        valueFrom:
          secretKeyRef:
            name: {{ .Values.clickhouse.monteCarloUser.secret }}
            key: password
      monte_carlo/networks/ip:
        {{- toYaml .Values.clickhouse.monteCarloUser.networksIp | nindent 8 }}
      monte_carlo/grants/query:
        {{- include "ao-data-platform.readerGrants" . | nindent 8 }}
        - "GRANT INSERT ON otel_traces.llm_inputs"
        - "GRANT INSERT ON otel_traces.llm_batches"
        - "GRANT INSERT ON otel_traces.conversation_eval_scores"
      {{- if .Values.clickhouse.readonlyUser.enabled }}
      readonly_user/password:
        valueFrom:
          secretKeyRef:
            name: {{ .Values.clickhouse.readonlyUser.secret }}
            key: password
      readonly_user/networks/ip:
        {{- toYaml .Values.clickhouse.readonlyUser.networksIp | nindent 8 }}
      readonly_user/profile: readonly_settings
      # Shared reader bundle (same as monte_carlo's reads): otel_traces.* + the system /
      # information_schema metadata reads DataGrip/MCP need. Going explicit removes the implicit
      # all-DB read a config user would otherwise have; readonly=2 (above) stays orthogonal and
      # governs SET, not table access.
      readonly_user/grants/query:
        {{- include "ao-data-platform.readerGrants" . | nindent 8 }}
      {{- end }}
      {{- if .Values.clickhouse.adminUser.enabled }}
      # admin — gated break-glass superuser: full access + user management + SYSTEM. Not for
      # service-to-service. Defaults to loopback-only (adminUser.networksIp), so it's usable only
      # by exec-ing into the pod.
      admin/password:
        valueFrom:
          secretKeyRef:
            name: {{ .Values.clickhouse.adminUser.secret }}
            key: password
      admin/networks/ip:
        {{- toYaml .Values.clickhouse.adminUser.networksIp | nindent 8 }}
      # GRANT ALL includes the ACCESS MANAGEMENT privilege group (CREATE USER / GRANT / …), so a
      # separate access_management setting is unnecessary — and ClickHouse rejects combining any
      # legacy access-control setting (access_management) with config-level `grants`.
      admin/grants/query:
        - "GRANT ALL ON *.* WITH GRANT OPTION"
      {{- end }}
    {{- if .Values.clickhouse.readonlyUser.enabled }}
    profiles:
      # readonly=2 keeps the user SELECT-only but allows per-session SET; the
      # built-in `readonly` profile is mode 1 and rejects all setting changes,
      # which breaks JDBC clients (DataGrip etc.) on handshake.
      readonly_settings/readonly: "2"
    {{- end }}
    files:
      # Remove the built-in `default` user. Stock ClickHouse ships `default`
      # with an empty password and `access_management: 1` (full superuser).
      # The Altinity operator restricts its networks to pod IPs but leaves the
      # password empty, so it stays a passwordless superuser reachable from
      # inside the pod. Nothing in this chart authenticates as `default` (all
      # clients use `otel`; the operator uses its own `clickhouse_operator`
      # user), so removing it is safe. See Altinity docs/security_hardening.md.
      users.d/remove_default_user.xml: |
        <clickhouse>
          <users>
            <default remove="1"/>
          </users>
        </clickhouse>
      {{- if .Values.tls.enabled }}
      server.crt:
        valueFrom:
          secretKeyRef:
            name: clickhouse-server-tls
            key: tls.crt
      server.key:
        valueFrom:
          secretKeyRef:
            name: clickhouse-server-tls
            key: tls.key
      ca.crt:
        valueFrom:
          secretKeyRef:
            name: clickhouse-server-tls
            key: ca.crt
      {{- end }}
    settings:
      # Cap CH memory at 80% of the cgroup limit. Requires
      # clickhouse.resources.limits.memory to be set so the ratio resolves
      # to the pod's cgroup limit rather than host RAM.
      max_server_memory_usage_to_ram_ratio: "0.8"
      # Quiet the server log for steady-state prod volume. CH defaults to
      # trace/information, which is too chatty for production.
      logger/level: notice
      # System log retention (capping these tables, which CH otherwise grows
      # without bound) is applied post-start by the schema Job, NOT here.
      # CH 26.4 ships each system-log table with an inline `<engine>` that
      # already carries a TTL, and the server rejects a separate `<ttl>`
      # setting on top of it ("If 'engine' is specified for system table, TTL
      # parameters should be specified directly inside 'engine'…", Code: 36) —
      # so configuring `query_log/ttl` here aborts startup. The Job applies the
      # retention via `ALTER TABLE system.<log> MODIFY TTL` instead; see
      # templates/schema-job.yaml.
      {{- if .Values.tls.enabled }}
      tcp_port_secure: "9440"
      https_port: "8443"
      openSSL/server/certificateFile: /etc/clickhouse-server/secrets.d/server.crt/clickhouse-server-tls/tls.crt
      openSSL/server/privateKeyFile: /etc/clickhouse-server/secrets.d/server.key/clickhouse-server-tls/tls.key
      openSSL/server/caConfig: /etc/clickhouse-server/secrets.d/ca.crt/clickhouse-server-tls/ca.crt
      {{- end }}
  defaults:
    templates:
      dataVolumeClaimTemplate: data
      serviceTemplate: clickhouse-svc
      # Stock installs always hit this branch (resources is defaulted in
      # values.yaml); the conditional is an escape hatch for consumers who
      # set all three to empty to fall back to operator defaults.
      {{- if or .Values.clickhouse.nodeSelector .Values.clickhouse.tolerations .Values.clickhouse.resources }}
      podTemplate: clickhouse
      {{- end }}
  templates:
    {{- if or .Values.clickhouse.nodeSelector .Values.clickhouse.tolerations .Values.clickhouse.resources }}
    podTemplates:
      - name: clickhouse
        spec:
          # `image` is required whenever this podTemplate emits a containers[]
          # entry — the Altinity operator does not merge container spec defaults.
          containers:
            - name: clickhouse
              image: {{ .Values.clickhouse.image }}
              {{- with .Values.clickhouse.resources }}
              resources:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              # Only the startupProbe is set here. The Altinity operator
              # injects its own liveness/readiness probes on the `clickhouse`
              # container for steady-state health, so we rely on those and
              # add only this startup gate. Generous startup window — large
              # mark-cache warmups on restart can otherwise trip liveness and
              # create restart loops.
              startupProbe:
                httpGet:
                  path: /ping
                  {{- if .Values.tls.enabled }}
                  port: 8443
                  scheme: HTTPS
                  {{- else }}
                  port: 8123
                  {{- end }}
                failureThreshold: 30
                periodSeconds: 10
          {{- with .Values.clickhouse.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.clickhouse.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
    {{- end }}
    serviceTemplates:
      - name: clickhouse-svc
        metadata:
          {{- if or .Values.clickhouse.service.annotations .Values.clickhouse.hostname }}
          annotations:
            {{- with .Values.clickhouse.service.annotations }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.clickhouse.hostname }}
            external-dns.alpha.kubernetes.io/hostname: {{ .Values.clickhouse.hostname }}
            {{- end }}
          {{- else }}
          {}
          {{- end }}
        spec:
          type: {{ .Values.clickhouse.service.type }}
          ports:
            {{- if .Values.tls.enabled }}
            - name: https
              port: 8443
            - name: tcp-secure
              port: 9440
            {{- else }}
            - name: http
              port: 8123
            - name: tcp
              port: 9000
            {{- end }}
    volumeClaimTemplates:
      - name: data
        spec:
          {{- if .Values.clickhouse.storageClass }}
          storageClassName: {{ .Values.clickhouse.storageClass }}
          {{- end }}
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: {{ .Values.clickhouse.storageSize }}
