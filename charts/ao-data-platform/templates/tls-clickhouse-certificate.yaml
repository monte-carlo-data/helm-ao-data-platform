{{- if .Values.tls.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: clickhouse-server-tls
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  secretName: clickhouse-server-tls
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
  dnsNames:
    - clickhouse-otel
    - clickhouse-otel.{{ .Release.Namespace }}
    - clickhouse-otel.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    {{- include "ao-data-platform.issuerRef" . | nindent 4 }}
{{- end }}
