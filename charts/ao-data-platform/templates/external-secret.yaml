{{/*
One ExternalSecret per ClickHouse user that has a Secrets-Manager-backed password.
The per-secret body is factored into the `ao-data-platform.externalSecret` helper (_helpers.tpl);
each user just contributes its K8s secret name + externalSecret config to the list below. Gated
users (readonly_user, admin) are appended only when enabled.
*/}}
{{- $extSecrets := list
      (dict "name" .Values.clickhouse.otelSecret          "externalSecret" .Values.clickhouse.externalSecret)
      (dict "name" .Values.clickhouse.schemaOwner.secret   "externalSecret" .Values.clickhouse.schemaOwner.externalSecret)
      (dict "name" .Values.clickhouse.llmWorkerUser.secret "externalSecret" .Values.clickhouse.llmWorkerUser.externalSecret)
      (dict "name" .Values.clickhouse.monteCarloUser.secret "externalSecret" .Values.clickhouse.monteCarloUser.externalSecret)
}}
{{- if .Values.clickhouse.readonlyUser.enabled }}
{{- $extSecrets = append $extSecrets (dict "name" .Values.clickhouse.readonlyUser.secret "externalSecret" .Values.clickhouse.readonlyUser.externalSecret) }}
{{- end }}
{{- range $extSecrets }}
---
{{ include "ao-data-platform.externalSecret" (dict "root" $ "name" .name "externalSecret" .externalSecret) }}
{{- end }}
