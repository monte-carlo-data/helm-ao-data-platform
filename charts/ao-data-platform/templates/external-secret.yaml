{{/*
One ExternalSecret per ClickHouse user that has a Secrets-Manager-backed password.
The per-secret body is factored into the `ao-data-platform.externalSecret` helper (_helpers.tpl);
each user just contributes its K8s secret name + externalSecret config to the list below. Gated
users (admin, readonly_user) are appended only when enabled.
Adding a ClickHouse user? Also update values.yaml and templates/clickhouse-installation.yaml.
*/}}
{{- $extSecrets := list
      (dict "name" .Values.clickhouse.otel.secret          "externalSecret" .Values.clickhouse.otel.externalSecret)
      (dict "name" .Values.clickhouse.schemaOwner.secret   "externalSecret" .Values.clickhouse.schemaOwner.externalSecret)
      (dict "name" .Values.clickhouse.llmWorker.secret "externalSecret" .Values.clickhouse.llmWorker.externalSecret)
      (dict "name" .Values.clickhouse.monteCarlo.secret "externalSecret" .Values.clickhouse.monteCarlo.externalSecret)
}}
{{- if .Values.clickhouse.admin.enabled }}
{{- $extSecrets = append $extSecrets (dict "name" .Values.clickhouse.admin.secret "externalSecret" .Values.clickhouse.admin.externalSecret) }}
{{- end }}
{{- if .Values.clickhouse.readonlyUser.enabled }}
{{- $extSecrets = append $extSecrets (dict "name" .Values.clickhouse.readonlyUser.secret "externalSecret" .Values.clickhouse.readonlyUser.externalSecret) }}
{{- end }}
{{- range $extSecrets }}
{{ include "ao-data-platform.externalSecret" (dict "root" $ "name" .name "externalSecret" .externalSecret) }}
{{- end }}
