apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.clickhouse.otelSecret }}
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.clickhouse.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ required "clickhouse.externalSecret.secretStoreRef.name is required" .Values.clickhouse.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.clickhouse.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.clickhouse.otelSecret }}
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ required "clickhouse.externalSecret.remoteRef.key is required" .Values.clickhouse.externalSecret.remoteRef.key }}
        {{- if .Values.clickhouse.externalSecret.remoteRef.property }}
        property: {{ .Values.clickhouse.externalSecret.remoteRef.property }}
        {{- end }}
        {{- if .Values.clickhouse.externalSecret.remoteRef.version }}
        version: {{ .Values.clickhouse.externalSecret.remoteRef.version }}
        {{- end }}
{{- if .Values.clickhouse.readonlyUser.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.clickhouse.readonlyUser.secret }}
  labels:
    {{- include "ao-data-platform.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.clickhouse.readonlyUser.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ required "clickhouse.readonlyUser.externalSecret.secretStoreRef.name is required when readonlyUser.enabled=true" .Values.clickhouse.readonlyUser.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.clickhouse.readonlyUser.externalSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.clickhouse.readonlyUser.secret }}
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: {{ required "clickhouse.readonlyUser.externalSecret.remoteRef.key is required when readonlyUser.enabled=true" .Values.clickhouse.readonlyUser.externalSecret.remoteRef.key }}
        {{- if .Values.clickhouse.readonlyUser.externalSecret.remoteRef.property }}
        property: {{ .Values.clickhouse.readonlyUser.externalSecret.remoteRef.property }}
        {{- end }}
        {{- if .Values.clickhouse.readonlyUser.externalSecret.remoteRef.version }}
        version: {{ .Values.clickhouse.readonlyUser.externalSecret.remoteRef.version }}
        {{- end }}
{{- end }}
